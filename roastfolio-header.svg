<defs>
<style>
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes scan{0%{transform:translateY(-8px);opacity:0}30%{opacity:.07}70%{opacity:.07}100%{transform:translateY(228px);opacity:0}}
@keyframes ember{0%,100%{opacity:.9;r:3}50%{opacity:.4;r:2}}
.cur{animation:blink 1.2s step-end infinite}
.sweep{animation:scan 6s linear infinite}
.e1{animation:ember 2.1s ease-in-out infinite}
.e2{animation:ember 2.8s ease-in-out infinite .4s}
.e3{animation:ember 3.4s ease-in-out infinite .9s}
</style>
