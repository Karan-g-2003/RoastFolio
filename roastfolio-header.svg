<svg width="900" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .scan { animation: scanline 4s linear infinite; }
      @keyframes scanline {
        0%   { transform: translateY(0px); opacity: 0.12; }
        50%  { opacity: 0.18; }
        100% { transform: translateY(320px); opacity: 0.12; }
      }
      .blink { animation: blinker 1.4s step-end infinite; }
      @keyframes blinker {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .tag-pulse { animation: tagpulse 2.5s ease-in-out infinite; }
      @keyframes tagpulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="900" height="320" rx="12" fill="#0d0d0d"/>

  <!-- Grid texture -->
  <g opacity="0.055" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="280" x2="900" y2="280"/>
    <line x1="90" y1="0" x2="90" y2="320"/><line x1="180" y1="0" x2="180" y2="320"/>
    <line x1="270" y1="0" x2="270" y2="320"/><line x1="360" y1="0" x2="360" y2="320"/>
    <line x1="450" y1="0" x2="450" y2="320"/><line x1="540" y1="0" x2="540" y2="320"/>
    <line x1="630" y1="0" x2="630" y2="320"/><line x1="720" y1="0" x2="720" y2="320"/>
    <line x1="810" y1="0" x2="810" y2="320"/>
  </g>

  <!-- Scanline sweep -->
  <rect class="scan" x="0" y="0" width="900" height="8" fill="#ffffff" opacity="0.12"/>

  <!-- Left fire dots -->
  <circle cx="50" cy="62" r="6" fill="#E85D24" opacity="0.9" class="tag-pulse"/>
  <circle cx="50" cy="82" r="4" fill="#E85D24" opacity="0.5"/>
  <circle cx="50" cy="96" r="2.5" fill="#E85D24" opacity="0.3"/>

  <!-- ROAST - pixel block letters (scaled larger, x-start=72) -->
  <!-- R -->
  <rect x="72" y="30" width="10" height="60" fill="#ffffff"/>
  <rect x="82" y="30" width="22" height="10" fill="#ffffff"/>
  <rect x="82" y="62" width="22" height="10" fill="#ffffff"/>
  <rect x="104" y="30" width="10" height="42" fill="#ffffff"/>
  <rect x="96" y="72" width="18" height="10" fill="#ffffff"/>
  <rect x="94" y="82" width="10" height="18" fill="#ffffff"/>
  <rect x="104" y="82" width="10" height="18" fill="#ffffff"/>

  <!-- O -->
  <rect x="126" y="30" width="10" height="60" fill="#ffffff"/>
  <rect x="136" y="30" width="22" height="10" fill="#ffffff"/>
  <rect x="136" y="80" width="22" height="10" fill="#ffffff"/>
  <rect x="158" y="30" width="10" height="60" fill="#ffffff"/>

  <!-- A -->
  <rect x="180" y="30" width="10" height="60" fill="#ffffff"/>
  <rect x="190" y="30" width="22" height="10" fill="#ffffff"/>
  <rect x="190" y="60" width="22" height="10" fill="#ffffff"/>
  <rect x="212" y="30" width="10" height="60" fill="#ffffff"/>

  <!-- S -->
  <rect x="234" y="30" width="32" height="10" fill="#ffffff"/>
  <rect x="234" y="62" width="32" height="10" fill="#ffffff"/>
  <rect x="234" y="80" width="32" height="10" fill="#ffffff"/>
  <rect x="234" y="30" width="10" height="42" fill="#ffffff"/>
  <rect x="256" y="62" width="10" height="28" fill="#ffffff"/>

  <!-- T -->
  <rect x="278" y="30" width="32" height="10" fill="#ffffff"/>
  <rect x="290" y="40" width="10" height="50" fill="#ffffff"/>

  <!-- flame separator -->
  <rect x="322" y="28" width="4" height="64" fill="#E85D24" opacity="0.8"/>
  <!-- small flame tips -->
  <polygon points="322,20 326,20 324,26" fill="#E85D24" opacity="0.9"/>

  <!-- FOLIO -->
  <!-- F -->
  <rect x="338" y="30" width="10" height="60" fill="#ffffff"/>
  <rect x="348" y="30" width="24" height="10" fill="#ffffff"/>
  <rect x="348" y="60" width="18" height="10" fill="#ffffff"/>

  <!-- O -->
  <rect x="384" y="30" width="10" height="60" fill="#ffffff"/>
  <rect x="394" y="30" width="22" height="10" fill="#ffffff"/>
  <rect x="394" y="80" width="22" height="10" fill="#ffffff"/>
  <rect x="416" y="30" width="10" height="60" fill="#ffffff"/>

  <!-- L -->
  <rect x="438" y="30" width="10" height="60" fill="#ffffff"/>
  <rect x="448" y="80" width="24" height="10" fill="#ffffff"/>

  <!-- I -->
  <rect x="484" y="30" width="10" height="60" fill="#ffffff"/>

  <!-- O -->
  <rect x="506" y="30" width="10" height="60" fill="#ffffff"/>
  <rect x="516" y="30" width="22" height="10" fill="#ffffff"/>
  <rect x="516" y="80" width="22" height="10" fill="#ffffff"/>
  <rect x="538" y="30" width="10" height="60" fill="#ffffff"/>

  <!-- Right fire dots -->
  <circle cx="570" cy="62" r="6" fill="#E85D24" opacity="0.9" class="tag-pulse"/>
  <circle cx="570" cy="82" r="4" fill="#E85D24" opacity="0.5"/>
  <circle cx="570" cy="96" r="2.5" fill="#E85D24" opacity="0.3"/>

  <!-- Horizontal rule -->
  <line x1="72" y1="112" x2="828" y2="112" stroke="#ffffff" stroke-width="0.5" opacity="0.15"/>

  <!-- Tagline -->
  <text x="450" y="142" text-anchor="middle" fill="#c8c7bf" font-family="'Courier New', monospace" font-size="16" letter-spacing="1.5">AI-powered developer career OS.</text>
  <text x="330" y="166" text-anchor="middle" fill="#888780" font-family="'Courier New', monospace" font-size="14" letter-spacing="0.8">Know where you stand.</text>
  <text x="484" y="166" text-anchor="middle" fill="#E85D24" font-family="'Courier New', monospace" font-size="14" font-weight="700" letter-spacing="0.8">Then fix it.</text>

  <!-- Badges -->
  <!-- LIVE -->
  <rect x="170" y="192" width="110" height="28" rx="4" fill="#E85D24"/>
  <circle cx="190" cy="206" r="5" fill="#ffffff" opacity="0.85"/>
  <text x="220" y="210" text-anchor="middle" fill="#ffffff" font-family="'Courier New', monospace" font-size="12" font-weight="700" letter-spacing="1.5">LIVE</text>

  <!-- URL -->
  <rect x="292" y="192" width="230" height="28" rx="4" fill="#111111" stroke="#E85D24" stroke-width="1"/>
  <text x="407" y="211" text-anchor="middle" fill="#E85D24" font-family="'Courier New', monospace" font-size="11" letter-spacing="0.3">roastfolio.karanbuilds.dev</text>

  <!-- MIT -->
  <rect x="534" y="192" width="64" height="28" rx="4" fill="#111111" stroke="#3B8BD4" stroke-width="1"/>
  <text x="566" y="211" text-anchor="middle" fill="#3B8BD4" font-family="'Courier New', monospace" font-size="12" font-weight="700" letter-spacing="2">MIT</text>

  <!-- Stars -->
  <rect x="610" y="192" width="100" height="28" rx="4" fill="#111111" stroke="#444441" stroke-width="1"/>
  <text x="660" y="211" text-anchor="middle" fill="#c8c7bf" font-family="'Courier New', monospace" font-size="11" letter-spacing="0.5">&#9733; STARS</text>

  <!-- Bottom divider -->
  <line x1="72" y1="242" x2="828" y2="242" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>

  <!-- Terminal line -->
  <text x="82" y="268" fill="#444441" font-family="'Courier New', monospace" font-size="12">&gt;</text>
  <text x="100" y="268" fill="#639922" font-family="'Courier New', monospace" font-size="12">roastfolio</text>
  <text x="190" y="268" fill="#888780" font-family="'Courier New', monospace" font-size="12">--analyze ./portfolio --brutal --no-mercy</text>
  <rect class="blink" x="548" y="256" width="8" height="14" fill="#E85D24" rx="1"/>

  <text x="82" y="298" fill="#333331" font-family="'Courier New', monospace" font-size="10">// paste your portfolio → get roasted → level up → repeat</text>

  <!-- Corner brackets -->
  <path d="M22 22 L22 42 L42 42" fill="none" stroke="#E85D24" stroke-width="1.5" opacity="0.5"/>
  <path d="M878 22 L878 42 L858 42" fill="none" stroke="#E85D24" stroke-width="1.5" opacity="0.5"/>
  <path d="M22 298 L22 278 L42 278" fill="none" stroke="#E85D24" stroke-width="1.5" opacity="0.5"/>
  <path d="M878 298 L878 278 L858 278" fill="none" stroke="#E85D24" stroke-width="1.5" opacity="0.5"/>
</svg>
